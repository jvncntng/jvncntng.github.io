<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography — JVNCNTNG</title>
<link rel="stylesheet" href="css/style.css">
<style>

/* ── HERO ── */
.photo-hero {
  height: 52vh; min-height: 340px;
  padding-top: 64px;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding-left: 52px; padding-right: 52px; padding-bottom: 52px;
  position: relative; overflow: hidden;
  background: var(--black);
}
.hero-diag {
  position: absolute; inset: 0; opacity: .6;
}
.hero-diag svg { width: 100%; height: 100%; }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,.85) 0%, rgba(0,0,0,.2) 70%);
}
.hero-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px;
  position: relative; z-index: 2;
  opacity: 0; animation: fadeUp .7s .3s forwards;
}
.hero-tag::before { content: ''; display: block; width: 32px; height: 1px; background: var(--accent); }
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(72px, 12vw, 160px);
  line-height: .9; color: var(--white); letter-spacing: -.01em;
  position: relative; z-index: 2;
  opacity: 0; animation: fadeUp .8s .5s forwards;
}
.hero-title span {
  color: transparent; -webkit-text-stroke: 2px var(--white);
}

/* ── FILTER TABS ── */
.filter-bar {
  padding: 40px 52px 0;
  display: flex; align-items: center; gap: 4px;
  border-bottom: 1px solid var(--line);
  overflow-x: auto;
}
.filter-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gray); background: none; border: none;
  padding: 14px 24px; cursor: none;
  position: relative; transition: color .25s;
  white-space: nowrap;
}
.filter-btn::after {
  content: '';
  position: absolute; bottom: -1px; left: 0;
  width: 0; height: 2px; background: var(--black);
  transition: width .3s ease;
}
.filter-btn:hover { color: var(--black); }
.filter-btn.active { color: var(--black); }
.filter-btn.active::after { width: 100%; }

/* ── PHOTO COUNT ── */
.photo-meta {
  padding: 28px 52px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.photo-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .14em; color: var(--gray);
}

/* ── GRID ── */
.photo-gallery {
  padding: 24px 52px 100px;
}
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

/* Individual photo item */
.gallery-item {
  position: relative; overflow: hidden;
  background: #111;
  cursor: none;
  aspect-ratio: 4/3;
  transition: opacity .35s ease, transform .35s ease;
}
.gallery-item.hidden {
  display: none;
}

/* Landscape photos wider */
.gallery-item[data-cat="landscape"]:nth-child(3n+1) {
  grid-column: span 2;
  aspect-ratio: 16/9;
}

/* Portrait photos taller */
.gallery-item[data-cat="portrait"] {
  aspect-ratio: 3/4;
}

.gallery-item img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  transition: transform .55s ease, filter .4s;
  filter: grayscale(15%);
}
.gallery-item:hover img {
  transform: scale(1.05);
  filter: grayscale(0%);
}

/* Hover overlay */
.gallery-item::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(10,10,10,0);
  transition: background .35s;
  z-index: 1;
}
.gallery-item:hover::before {
  background: rgba(10,10,10,.35);
}

/* View hint */
.gallery-item::after {
  content: 'View';
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--white);
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .35s;
  z-index: 2; pointer-events: none;
}
.gallery-item:hover::after { opacity: 1; }

/* Category tag on photo */
.gallery-tag {
  position: absolute; bottom: 14px; left: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--white); background: rgba(10,10,10,.6);
  padding: 5px 10px; backdrop-filter: blur(4px);
  opacity: 0; transform: translateY(6px);
  transition: opacity .3s, transform .3s;
  z-index: 3;
}
.gallery-item:hover .gallery-tag {
  opacity: 1; transform: none;
}

/* Placeholder when no photo yet */
.gallery-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}
.gallery-placeholder svg { width: 100%; height: 100%; position: absolute; inset: 0; }
.gallery-placeholder-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
  color: rgba(255,255,255,.2); position: relative; z-index: 2;
}

/* Empty state */
.empty-state {
  grid-column: span 3;
  padding: 80px 0; text-align: center;
  display: none;
}
.empty-state.visible { display: block; }
.empty-state p {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gray);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.gallery-item { opacity: 0; animation: fadeIn .5s forwards; }
.gallery-item:nth-child(1)  { animation-delay: .05s; }
.gallery-item:nth-child(2)  { animation-delay: .10s; }
.gallery-item:nth-child(3)  { animation-delay: .15s; }
.gallery-item:nth-child(4)  { animation-delay: .20s; }
.gallery-item:nth-child(5)  { animation-delay: .25s; }
.gallery-item:nth-child(6)  { animation-delay: .30s; }
.gallery-item:nth-child(7)  { animation-delay: .35s; }
.gallery-item:nth-child(8)  { animation-delay: .40s; }
.gallery-item:nth-child(9)  { animation-delay: .45s; }
.gallery-item:nth-child(10) { animation-delay: .50s; }

@media (max-width: 768px) {
  .photo-hero { padding: 80px 24px 40px; }
  .filter-bar { padding: 28px 24px 0; gap: 0; }
  .filter-btn { padding: 12px 16px; }
  .photo-meta { padding: 20px 24px 0; }
  .photo-gallery { padding: 16px 24px 80px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
  .gallery-item[data-cat="landscape"]:nth-child(3n+1) { grid-column: span 2; }
  .gallery-item[data-cat="portrait"] { aspect-ratio: 4/3; }
  .empty-state { grid-column: span 2; }
}
</style>
</head>

<script>
// ── FILTER ────────────────────────────────────────────────────────────────
const btns  = document.querySelectorAll('.filter-btn');
const items = document.querySelectorAll('.gallery-item');
const count = document.getElementById('photoCount');
const empty = document.getElementById('emptyState');

function updateCount(visible) {
  count.textContent = `${visible} photo${visible !== 1 ? 's' : ''}`;
}

function filter(cat) {
  let visible = 0;
  items.forEach(item => {
    const match = cat === 'all' || item.dataset.cat === cat;
    item.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  empty.classList.toggle('visible', visible === 0);
  updateCount(visible);
}

btns.forEach(btn => {
  btn.addEventListener('click', () => {
    btns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter(btn.dataset.filter);
  });
});

// Init count
updateCount(items.length);
</script>
